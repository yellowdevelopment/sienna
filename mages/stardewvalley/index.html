<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://rawcdn.githack.com/skibbsz/jsdelivr-cdns/0d77246809f1bfd28e9e3341e670ee8012f2bf3c/stardewvalley/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stardew Valley</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font: 1.5rem/1 sans-serif;
            z-index: 1;
            flex-direction: column; gap: 1rem;
        }
        #loading.hidden { display: none; }
        #music-choice {
            display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
        }
        #music-choice button {
            font: 1.1rem/1 sans-serif; padding: 0.6rem 1.5rem;
            border: 2px solid #fff; border-radius: 6px;
            background: transparent; color: #fff; cursor: pointer;
            min-width: 260px; transition: background 0.15s;
        }
        #music-choice button:hover { background: rgba(255,255,255,0.15); }
        #music-choice .hint { font-size: 0.85rem; opacity: 0.6; }
        canvas {
            width: 100%; height: 100%; display: block;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div id="music-choice">
            <div>Download options</div>
            <button id="btn-no-music">Play without music <span class="hint">(~64 MB)</span></button>
            <button id="btn-with-music">Play with music <span class="hint">(~540 MB)</span></button>
        </div>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
      // Blazor sends credentialed fetches by default, but rawcdn.githack.com
      // doesn't allow credentials — intercept and strip them before they go out.
      const _origFetch = window.fetch;
      window.fetch = function(input, init = {}) {
        const url = typeof input === 'string' ? input : (input?.url || '');
        if (url.includes('rawcdn.githack.com') || url.includes('raw.githack.com')) {
          init = { ...init, credentials: 'omit', mode: 'cors' };
          if (input instanceof Request) {
            input = new Request(input, { credentials: 'omit', mode: 'cors' });
          }
        }
        return _origFetch.call(this, input, init);
      };
    </script>

    <script type="module" src="game.js"></script>
</body>
</html>
