<!DOCTYPE html>
<html>
  <head>
    <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/infiltratingtheairship/">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Henry Stickmin - Infiltrating the Airship</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background-color: #000; overflow: hidden; }
      #ruffle, #player { width: 100%; height: 100%; display: block; }
    </style>

    <!-- 1. Config first -->
    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'Henry Stickmin - Infiltrating the Airship.swf', parts: 2 },
        ],
        basePath: '',
        debug: true
      };
    </script>

    <!-- 2. merge.js second -->
    <script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js"></script>

    <!-- 3. Ruffle third -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <body>
    <div id="ruffle"></div>

    <!-- 4. Load SWF only after merge is done -->
    <script>
      const SWF_NAME = 'Henry Stickmin - Infiltrating the Airship.swf';

      function waitForMerge() {
        return new Promise((resolve) => {
          const interval = setInterval(() => {
            if (window.mergedFiles && window.mergedFiles[SWF_NAME]) {
              clearInterval(interval);
              resolve(window.mergedFiles[SWF_NAME]);
            }
          }, 200);
        });
      }

      window.addEventListener("load", async () => {
        const buffer = await waitForMerge();
        const blob = new Blob([buffer], { type: 'application/x-shockwave-flash' });
        const blobUrl = URL.createObjectURL(blob);

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        const container = document.getElementById("ruffle");
        player.id = "player";
        container.appendChild(player);
        player.load(blobUrl);
      });
    </script>
  </body>
</html>
