<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/getawayshooter/">
    <link rel="icon" type="image/x-icon" href="img/images.jpg" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Getaway Shootout</title>

    <!-- 1. Config first -->
    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'GetawayShootout.asm.code.unityweb', parts: 2 },
        ],
        basePath: 'unity/',
        debug: true
      };
    </script>

    <!-- 2. merge.js second -->
    <script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js"></script>

    <!-- 3. UnityLoader third -->
    <script src="Build/UnityLoader.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000000;
      }
      #gameContainer {
        width: 100%;
        height: 100%;
      }
      #gameContainer canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="gameContainer"></div>

    <!-- 4. Instantiate last -->
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "GetawayShootout.json");
    </script>
  </body>
</html>
