<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/rebound/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Rebound</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #unity-container {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
      }

      #unity-canvas {
        flex: 1;
        width: 100% !important;
        height: 100% !important;
      }

      #unity-footer {
        display: flex;
        align-items: center;
        padding: 4px 10px;
        background: #000;
        flex-shrink: 0;
      }

      #unity-loading-bar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      #unity-warning {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
        <div id="unity-build-title">Rebound</div>
      </div>
    </div>
    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'WebGL.wasm.gz', parts: 3 },
          { name: 'WebGL.data.gz', parts: 3 },
        ],
        basePath: 'Build/',
        debug: true
      };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var cdnBase = "https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/rebound/";
      var buildUrl = cdnBase + "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      // Fetch framework manually to fix jsDelivr's text/plain MIME type
      // which Firefox blocks when loading as a <script>
      fetch(buildUrl + "/WebGL.framework.js.gz")
        .then(res => res.text())
        .then(jsText => {
          const blob = new Blob([jsText], { type: "application/javascript" });
          const frameworkBlobUrl = URL.createObjectURL(blob);

          var config = {
            arguments: [],
            dataUrl: buildUrl + "/WebGL.data.gz",
            frameworkUrl: frameworkBlobUrl,
            codeUrl: buildUrl + "/WebGL.wasm.gz",
            // Absolute CDN URL so Unity doesn't resolve .bank files against localhost
            streamingAssetsUrl: cdnBase + "StreamingAssets",
            companyName: "Team Bouldy",
            productName: "Rebound",
            productVersion: "0.0.372",
            showBanner: unityShowBanner,
          };

          var script = document.createElement("script");
          script.src = loaderUrl;
          script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
              document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
            }).then((unityInstance) => {
              document.querySelector("#unity-loading-bar").style.display = "none";

              const fsButton = document.querySelector("#unity-fullscreen-button");
              if (fsButton) {
                fsButton.onclick = () => unityInstance.SetFullscreen(1);
              }

              URL.revokeObjectURL(frameworkBlobUrl);
            }).catch((message) => {
              alert(message);
            });
          };
          document.body.appendChild(script);
        })
        .catch(err => alert("Failed to load framework: " + err));
    </script>
  </body>
</html>
