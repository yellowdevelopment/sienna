<!DOCTYPE html>
<html lang="en-us">
<head>
<base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/pumpkill64/">
<meta charset="utf-8">
<title>google.com</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<style>
/* -------------------- SENİN ORJİNAL CSS -------------------- */
body {
  margin:0px;
  padding:0px;
  position: absolute; 
  height:100%;
  width:100%;
  background-size:cover;
  font-style: regular;
  font-family:"Myriad Pro", Myriad,"Helvetica Neue", Helvetica, Arial, sans-serif;
}

#unity-container {
  padding:0px;
  position:absolute;
  height:100vh;
  width:100vw;
  background-color:#121214;
}

#unity-container.unity-desktop {
  position:absolute;
  height:100%;
  width:100%;
}

#unity-canvas {
  position:absolute;
  height:100%;
  width:100%;
}

#unity-fullscreen-button {
  height:32px;
  width:32px;
  position:absolute;
  z-index:1;
  bottom:0px;
  right:0px;
  background-color:transparent;
  background-image:url("https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/g+/background.png");
  background-repeat: no-repeat;
  background-position: center;
  border:none;
  cursor: pointer;
  opacity: 0.333;
  padding: 24px;
}

#unity-fullscreen-button:hover{
  opacity: 1.0;
}

#unity-warning { position: absolute; left: 50%; top: 5%; transform: translate(-50%); background: white; padding: 10px; display: none }

#unity-loading-bar { 
  position: absolute; 
  left: 50%; 
  top: 50%; 
  transform: translate(-50%, -50%); 
  display: none 
}

#unity-progress-bar-empty { 
  width: 256px; 
  height: 20px; 
  background: url('progress-bar-empty.png') no-repeat left 
}

#unity-progress-bar-full { 
  width: 0%; 
  height: 20px; 
  background: url('progress-bar-full.png') no-repeat left 
}

#unity-container.unity-mobile { width: 100%; height: 100% }
.unity-mobile #unity-footer { display: none }
.unity-mobile #unity-canvas { width: 100%; height: 100% }

/* -------------------- YENİ LOADING OVERLAY -------------------- */
#preload-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.65);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.6s ease;
}

.loader-dots {
  display: flex;
  gap: 10px;
}

.loader-dots div {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: white;
  animation: bounce 0.8s infinite;
}

.loader-dots div:nth-child(2) { animation-delay: 0.2s; }
.loader-dots div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0% { transform: translateY(0); opacity: 0.4; }
  50% { transform: translateY(-10px); opacity: 1; }
  100% { transform: translateY(0); opacity: 0.4; }
}

.preload-text {
  color: white;
  font-size: 22px;
  margin-bottom: 20px;
  letter-spacing: 1px;
  opacity: 0.8;
}
</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preload-overlay">
  <div class="preload-text">G+ XD but yellowdevelopmnt took it and now its on Sienna so L g+</div>
  <div class="loader-dots">
    <div></div><div></div><div></div>
  </div>
</div>

<div id="unity-container" class="unity-desktop">
  <button id="unity-fullscreen-button" onclick="toggleFullscreen()"></button>
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-warning"></div>
</div>

<script>
var canvas = document.querySelector("#unity-canvas");
var loadingBar = document.querySelector("#unity-loading-bar");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var preload = document.getElementById("preload-overlay");

function toggleFullscreen() {}
var buildUrl = "Build";
var loaderUrl = buildUrl + "/html.loader.js";

/* ---------------- PART BİRLEŞTİRME ---------------- */
async function mergeParts(prefix, count) {
  const parts = [];
  for (let i = 1; i <= count; i++) {
    const url = `${buildUrl}/${prefix}.part${i}`;
    const res = await fetch(url);
    parts.push(await res.arrayBuffer());
  }

  let total = parts.reduce((s, p) => s + p.byteLength, 0);
  let merged = new Uint8Array(total);

  let offset = 0;
  for (let p of parts) {
    merged.set(new Uint8Array(p), offset);
    offset += p.byteLength;
  }

  return URL.createObjectURL(new Blob([merged]));
}

var config = {
  dataUrl: "",
  frameworkUrl: buildUrl + "/html.framework.js",
  codeUrl: "",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "Demon Code Studios",
  productName: "PUMPKILL 64",
  productVersion: "0.1.0",
};

async function prepareMergedFiles() {
  config.dataUrl = await mergeParts("html.data", 2);
  config.codeUrl = await mergeParts("html.wasm", 3);
}

prepareMergedFiles().then(() => {
  var script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (progress * 100) + "%";
      loadingBar.style.display = "block";
    }).then(() => {
      preload.style.opacity = "0";
      setTimeout(() => preload.remove(), 700);
    }).catch((message) => alert(message));
  };

  document.body.appendChild(script);
});
</script>


</body>
</html>
