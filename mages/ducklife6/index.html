<!DOCTYPE html>
<html lang="en-us" style="height:100%">
<head>
<base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/ducklife6/">
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Duck Life Space</title>

<!-- 1. Config FIRST so merge.js can read it immediately -->
<script>
  window.fileMergerConfig = {
    files: [
      { name: 'WebGL5MP-DATA.unityweb', parts: 3 },
    ],
    basePath: 'Build/',
    debug: true
  };
</script>

<!-- 2. merge.js SECOND so it patches fetch/XHR before anything else loads -->
<script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js"></script>

<!-- 3. UnityLoader THIRD so it uses the patched fetch/XHR -->
<script src="Build/UnityLoader.js" type="text/javascript"></script>

<style type="text/css">
  body, html {
    margin: 0;
    padding: 0;
  }
  #gameContainer canvas {
    position: absolute;
    transform: translate(-50%, -50%);
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body style="width:100%; height:100%; margin:0">
<div id="gameContainer" style="width:100%; height:100%;"></div>

<!-- 4. Instantiate LAST, after everything is ready -->
<script type="text/javascript">
  var gameInstance = UnityLoader.instantiate("gameContainer", "Build/WebGL5MP.json");
</script>

<!-- After UnityLoader instantiate -->
<script>
  // Force-remove merge overlay after Unity signals it's ready
  var _overlayKiller = setInterval(function() {
    var overlay = document.getElementById('file-merger-loading');
    if (!overlay) { clearInterval(_overlayKiller); return; }
    // Check if all files are done via mergeStatus
    var allDone = window.fileMergerConfig.files.every(function(f) {
      return window.mergedFiles && window.mergedFiles[f.name];
    });
    if (allDone) {
      clearInterval(_overlayKiller);
      setTimeout(function() {
        overlay.style.transition = 'opacity 0.5s';
        overlay.style.opacity = '0';
        setTimeout(function() { overlay.remove(); }, 500);
      }, 1500);
    }
  }, 500);
</script>

<script src="./rocket-loader.min.js" data-cf-settings="-|49" defer=""></script>
</body>
</html>
