<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="https://rawcdn.githack.com/skibbsz/jsdelivr-cdns/a4b5366f882889758265ab09ac728fd8b747d096/backrooms2d/TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Backrooms 2D</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      const BASE = "https://rawcdn.githack.com/skibbsz/jsdelivr-cdns/a4b5366f882889758265ab09ac728fd8b747d096/backrooms2d/";

      async function fetchParts(partUrls, mimeType) {
        const buffers = await Promise.all(partUrls.map(url =>
          fetch(url).then(r => {
            if (!r.ok) throw new Error("Failed to fetch: " + url);
            return r.arrayBuffer();
          })
        ));
        const blob = new Blob(buffers, { type: mimeType });
        return URL.createObjectURL(blob);
      }

      async function main() {
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          var meta = document.createElement('meta');
          meta.name = 'viewport';
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          document.getElementsByTagName('head')[0].appendChild(meta);
          container.className = "unity-mobile";
          canvas.className = "unity-mobile";
          unityShowBanner('WebGL builds are not supported on mobile devices.');
        } else {
          canvas.style.width = "1280px";
          canvas.style.height = "720px";
        }

        canvas.style.background = "url('" + BASE + "7-21-23.jpg') center / cover";
        loadingBar.style.display = "block";

        const [dataUrl, frameworkUrl, codeUrl] = await Promise.all([
          fetchParts([
            BASE + "7-21-23.data.part1",
            BASE + "7-21-23.data.part2",
            BASE + "7-21-23.data.part3",
            BASE + "7-21-23.data.part4",
            BASE + "7-21-23.data.part5",
          ], "application/octet-stream"),
          fetchParts([
            BASE + "7-21-23.framework.js.part1",
          ], "application/javascript"),
          fetchParts([
            BASE + "7-21-23.wasm.part1",
            BASE + "7-21-23.wasm.part2",
          ], "application/wasm"),
        ]);

        var loaderUrl = BASE + "7-21-23.loader.js";
        var config = {
          dataUrl:      dataUrl,
          frameworkUrl: frameworkUrl,
          codeUrl:      codeUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "JujuProdGames",
          productName: "Backrooms 2D",
          productVersion: "0.3",
          showBanner: unityShowBanner,
        };

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }).catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }

      main().catch(err => {
        alert("Failed to load game files: " + err.message);
      });
    </script>
  </body>
</html>
