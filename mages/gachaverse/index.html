<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/gachaverse/">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gacha Verse</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #ruffle {
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
  }

  #ruffle > * {
    width: 100% !important;
    height: 100% !important;
  }
</style>

  <!-- Ruffle -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <!-- File merger config -->
  <script>
    window.fileMergerConfig = {
      files: [
        { name: 'gachaversePC.swf', parts: 5 },
      ],
      basePath: '',
      debug: true
    };
  </script>

  <script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js"></script>
</head>

<body>
  <div id="ruffle"></div>

  <script>
    const SWF_NAME = 'gachaversePC.swf';

    function waitForMerge() {
      return new Promise((resolve) => {
        const interval = setInterval(() => {
          if (window.mergedFiles && window.mergedFiles[SWF_NAME]) {
            clearInterval(interval);
            resolve(window.mergedFiles[SWF_NAME]);
          }
        }, 100);
      });
    }

    window.addEventListener("load", async () => {
      const buffer = await waitForMerge();

      const blob = new Blob([buffer], {
        type: "application/x-shockwave-flash"
      });

      const blobUrl = URL.createObjectURL(blob);

      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();

      document.getElementById("ruffle").appendChild(player);

      player.load(blobUrl);
    });
  </script>
</body>
</html>
