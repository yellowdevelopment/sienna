<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>gn-math · clean game hub</title>
    <meta name="description" content="Unblocked games, minimal design, fast and lightweight.">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0f18;
            font-family: 'Inter', sans-serif;
            color: #e6edf5;
            line-height: 1.4;
            padding-bottom: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(30, 50, 80, 0.2), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .chip-strip {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.8rem 1.5rem;
            max-width: 1440px;
            margin: 0 auto;
            scrollbar-width: thin;
            position: sticky;
            top: 0;
            background: rgba(11, 15, 24, 0.92);
            backdrop-filter: blur(8px);
            z-index: 90;
            border-bottom: 1px solid #1f2a3a;
        }

        .chip {
            background: #141c2c;
            border: 1px solid #2a3a50;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #b9c7d9;
        }

        .chip.active, .chip:hover {
            background: #2c3e5c;
            border-color: #4a6a8e;
            color: white;
        }

        .search-wrap {
            max-width: 380px;
            margin: 1.2rem auto 0.8rem;
            position: relative;
            padding: 0 1rem;
        }

        #searchBar {
            width: 100%;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            background: #0f1622;
            border: 1px solid #252f3f;
            border-radius: 40px;
            color: #eef4ff;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        #searchBar:focus {
            outline: none;
            border-color: #4a7c9c;
            background: #121a2a;
        }

        .search-icon {
            position: absolute;
            left: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
            width: 15px;
            color: #a0b4d0;
        }

        main {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0.5rem 1.5rem 2rem;
            position: relative;
            z-index: 2;
        }

        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 1.5rem 0 0.8rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e2edff;
            letter-spacing: -0.2px;
        }

        .section-sub {
            font-size: 0.7rem;
            color: #7e8da0;
            cursor: default;
        }

        .hero-spotlight {
            margin: 0.5rem 0 1rem;
        }

        .swiper.featured-slider {
            overflow: visible;
        }

        .featured-slider .swiper-slide {
            width: 86%;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .featured-slider .swiper-slide-prev,
        .featured-slider .swiper-slide-next {
            opacity: 0.5;
            transform: scale(0.94);
            filter: blur(2px);
            pointer-events: none;
        }

        .featured-slider .swiper-slide-active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            z-index: 2;
        }

        .slide-content {
            display: flex;
            background: #111927;
            border: 1px solid #283544;
            border-radius: 16px;
            height: 340px;
            overflow: hidden;
        }

        .slide-img {
            width: 55%;
            object-fit: contain;
            padding: 1.6rem;
            background: #0c111c;
        }

        .slide-info {
            width: 45%;
            padding: 2rem 1.8rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.6rem;
        }

        .hero-title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #f0f6ff;
            letter-spacing: -0.3px;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.2rem 0;
        }

        .hero-tag {
            background: #1f2a3a;
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #bcd0f0;
        }

        .hero-btn {
            background: #2c3e5c;
            border: none;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            width: fit-content;
            margin-top: 0.4rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .hero-btn:hover {
            background: #3c5a7c;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.2rem;
        }

        .game-card {
            background: #111722;
            border: 1px solid #242e3c;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-3px);
            background: #161e2c;
            border-color: #3a5070;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #0a101c;
        }

        .star {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 1.4rem;
            color: rgba(210, 180, 80, 0.6);
            cursor: pointer;
            z-index: 3;
            transition: 0.1s;
        }

        .star.starred {
            color: #f5c542;
        }

        .card-info {
            padding: 0.7rem;
        }

        .game-name {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-badge {
            font-size: 0.65rem;
            color: #8a9bc0;
            margin-top: 0.2rem;
            display: inline-block;
            background: #1a2332;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .horizontal-list .swiper-slide {
            width: 180px;
        }

        .swiper-button-next, .swiper-button-prev {
            width: 36px;
            height: 36px;
            background: #0f1622;
            border: 1px solid #2a3a50;
            border-radius: 50%;
            transition: 0.2s;
        }

        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 14px;
            font-weight: bold;
            color: #c0d0e8;
        }

        .swiper-button-next:hover, .swiper-button-prev:hover {
            background: #1f2e42;
        }

        .zone-viewer {
            position: fixed;
            inset: 0;
            background: #070b12f2;
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        .zone-header {
            background: #0f1622;
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3a50;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .zone-controls {
            display: flex;
            gap: 0.8rem;
        }

        .zone-controls button {
            background: #1f2a3a;
            border: 1px solid #3a5a7a;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .zone-controls button:hover {
            background: #2c3e5c;
            transform: translateY(-1px);
        }

        #zoneFrame {
            flex: 1;
            border: none;
            background: white;
            width: 100%;
            height: 100%;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 11000;
        }

        .modal-card {
            background: #121a28;
            border-radius: 20px;
            max-width: 420px;
            width: 90%;
            border: 1px solid #2e4058;
        }

        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #232e3e;
            display: flex;
            justify-content: space-between;
        }

        .modal-body {
            padding: 1.2rem;
        }

        .hidden {
            display: none !important;
        }

        footer {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.7rem;
            color: #5f6f88;
            border-top: 1px solid #1f2a38;
            margin-top: 2.5rem;
        }

        @media (max-width: 700px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }
            .horizontal-list .swiper-slide { width: 150px; }
            .slide-info { padding: 1rem; }
            .hero-title { font-size: 1.2rem; }
            .slide-content { height: 260px; }
            .section-title { font-size: 1rem; }
            .zone-controls button { padding: 0.35rem 0.9rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="chip-strip" id="catStrip"></div>

<div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchBar" placeholder="Search games...">
</div>

<main>
    <div id="modernView">
        <div class="hero-spotlight">
            <div class="swiper featured-slider">
                <div class="swiper-wrapper" id="heroSlider"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </div>

        <div class="section-header">
            <div class="section-title">Trending this week</div>
            <div class="section-sub"></div>
        </div>
        <div class="swiper horizontal-list" id="trendingSwiper">
            <div class="swiper-wrapper" id="trendingWrapper"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>

        <div class="section-header">
            <div class="section-title">Featured</div>
        </div>
        <div class="grid" id="featuredGrid"></div>

        <div class="section-header">
            <div class="section-title">All games</div>
            <select id="sortSelect" style="background:#111722; border:1px solid #2a3a50; border-radius:30px; padding:0.3rem 0.8rem; font-size:0.75rem; color:#eef;">
                <option value="name">Name A-Z</option>
                <option value="id">Newest first</option>
            </select>
        </div>
        <div class="grid" id="allGamesGrid"></div>
    </div>

    <div id="searchView" class="hidden">
        <div class="section-header"><div class="section-title">Search results</div></div>
        <div class="grid" id="searchResults"></div>
    </div>
</main>

<footer>powered by gn-math</footer>

<div id="zoneViewer" class="zone-viewer">
    <div class="zone-header">
        <div><strong id="zoneName" style="font-size:1rem;">Game</strong> <span id="zoneAuthor" style="font-size:0.75rem;"></span></div>
        <div class="zone-controls">
            <button onclick="fullscreenFrame()">Fullscreen</button>
            <button onclick="openInAboutBlank()">New tab</button>
            <button onclick="downloadGame()">Download</button>
            <button onclick="closeZone()">Close</button>
        </div>
    </div>
    <iframe id="zoneFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
</div>

<div id="globalModal" class="modal"><div class="modal-card"><div class="modal-header"><h3 id="modalTitle">Settings</h3><button onclick="closeModal()" style="background:none; border:none; font-size:1.5rem; color:#ccc;">×</button></div><div class="modal-body" id="modalContent"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // ---------- STORAGE SAFETY ----------
    (function() {
        const mem = {};
        const safe = {
            getItem: k => { try { return localStorage.getItem(k); } catch(e) { return mem[k] || null; } },
            setItem: (k,v) => { try { localStorage.setItem(k,v); } catch(e) { mem[k]=String(v); } },
            removeItem: k => { try { localStorage.removeItem(k); } catch(e) { delete mem[k]; } }
        };
        try { localStorage.setItem('test','test'); localStorage.removeItem('test'); }
        catch(e) { Object.defineProperty(window,'localStorage',{ value:safe, writable:false, configurable:false }); }
        try { document.cookie = 'test=test'; } catch(e) { Object.defineProperty(document,'cookie',{ get:()=>'', set:()=>true }); }
    })();

    // ---------- CONFIG ----------
    const CONFIG = {
        zones: "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
        zonesFallback: "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json",
        covers: "https://cdn.jsdelivr.net/gh/freebuisness/covers@main",
        coversFallback: "https://cdn.jsdelivr.net/gh/gn-math/covers@main",
        html: "https://cdn.jsdelivr.net/gh/freebuisness/html@main",
        htmlFallback: "https://cdn.jsdelivr.net/gh/gn-math/html@main"
    };
    let state = { games: [], categories: [], heroSwiper: null, trendingSwiper: null };

    async function fetchGames() {
        try {
            let url = CONFIG.zones;
            const commitRes = await fetch("https://api.github.com/repos/freebuisness/assets/commits?t="+Date.now());
            if (commitRes.ok) {
                const shaData = await commitRes.json();
                if (shaData[0]?.sha) url = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${shaData[0].sha}/zones.json`;
            }
            const res = await fetch(url + "?t="+Date.now());
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) {
            const fallbackRes = await fetch(CONFIG.zonesFallback + "?t="+Date.now());
            if (!fallbackRes.ok) throw new Error("Failed to load games");
            return await fallbackRes.json();
        }
    }

    function resolveUrl(u) { return u.replace("{COVER_URL}", CONFIG.covers).replace("{HTML_URL}", CONFIG.html); }
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') || ''; }

    function renderGameCard(game, favs) {
        const tag = (game.special && game.special[0]) || '';
        return `<div class="game-card" onclick="openGame(${game.id})">
            <div class="star ${favs.includes(game.id) ? 'starred' : ''}" onclick="event.stopPropagation(); toggleFavorite(${game.id}, this)">★</div>
            <img class="card-img" src="${resolveUrl(game.cover)}" loading="lazy" onerror="this.src='https://placehold.co/200x200?text=No+Cover'">
            <div class="card-info">
                <div class="game-name">${escapeHtml(game.name)}</div>
                ${tag ? `<div class="game-badge">${escapeHtml(tag)}</div>` : ''}
            </div>
        </div>`;
    }

    function buildCategories() {
        const cats = new Set();
        state.games.forEach(g => { if(g.special) g.special.forEach(t => cats.add(t)); });
        state.categories = Array.from(cats).slice(0, 14);
        const strip = document.getElementById('catStrip');
        strip.innerHTML = `<button class="chip active" data-filter="all">All Games</button><button class="chip" data-filter="favs">★ Favorites</button>`;
        state.categories.forEach(c => { strip.innerHTML += `<button class="chip" data-filter="${c}">${c}</button>`; });
        strip.querySelectorAll('.chip').forEach(btn => {
            btn.onclick = () => {
                strip.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.getAttribute('data-filter');
                if(filter === 'all') showAll();
                else if(filter === 'favs') showFavorites();
                else filterByCategory(filter);
            };
        });
    }

    function showAll() {
        document.getElementById('modernView').classList.remove('hidden');
        document.getElementById('searchView').classList.add('hidden');
        document.getElementById('searchBar').value = '';
        renderAllGames();
    }

    function showFavorites() {
        const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        const filtered = state.games.filter(g => favs.includes(g.id));
        document.getElementById('modernView').classList.add('hidden');
        document.getElementById('searchView').classList.remove('hidden');
        const container = document.getElementById('searchResults');
        container.innerHTML = filtered.length ? filtered.map(g => renderGameCard(g, favs)).join('') : '<div style="text-align:center; padding:2rem;">⭐ No favorites yet</div>';
    }

    function filterByCategory(cat) {
        const filtered = state.games.filter(g => g.special?.includes(cat));
        document.getElementById('modernView').classList.add('hidden');
        document.getElementById('searchView').classList.remove('hidden');
        const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        document.getElementById('searchResults').innerHTML = filtered.map(g => renderGameCard(g, favs)).join('');
    }

    function handleSearch() {
        const q = document.getElementById('searchBar').value.trim().toLowerCase();
        if(!q) { showAll(); return; }
        const results = state.games.filter(g => g.name.toLowerCase().includes(q));
        document.getElementById('modernView').classList.add('hidden');
        document.getElementById('searchView').classList.remove('hidden');
        const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        document.getElementById('searchResults').innerHTML = results.length ? results.map(g => renderGameCard(g, favs)).join('') : `<div style="text-align:center; padding:2rem;">No results for "${escapeHtml(q)}"</div>`;
    }

    function renderAllGames() {
        const sortBy = document.getElementById('sortSelect').value;
        let games = [...state.games];
        if(sortBy === 'name') games.sort((a,b)=> a.name.localeCompare(b.name));
        else games.sort((a,b)=> b.id - a.id);
        const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        document.getElementById('allGamesGrid').innerHTML = games.map(g => renderGameCard(g, favs)).join('');
    }

    function renderFeatured() {
        const featured = state.games.filter(g => g.featured || g.id % 7 === 0).slice(0, 8);
        const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        document.getElementById('featuredGrid').innerHTML = featured.map(g => renderGameCard(g, favs)).join('');
    }

    function renderTrending() {
        const trending = [...state.games].sort(() => Math.random() - 0.5).slice(0, 14);
        const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        document.getElementById('trendingWrapper').innerHTML = trending.map(g => `<div class="swiper-slide">${renderGameCard(g, favs)}</div>`).join('');
        if(state.trendingSwiper) state.trendingSwiper.update();
    }

    function renderHero() {
        const heroGames = [...state.games].sort(() => Math.random() - 0.5).slice(0, 5);
        document.getElementById('heroSlider').innerHTML = heroGames.map(g => `
            <div class="swiper-slide">
                <div class="slide-content">
                    <img class="slide-img" src="${resolveUrl(g.cover)}" loading="lazy">
                    <div class="slide-info">
                        <div class="hero-title">${escapeHtml(g.name)}</div>
                        <div class="hero-meta">${(g.special || []).slice(0,2).map(t => `<span class="hero-tag">${escapeHtml(t)}</span>`).join('')}</div>
                        <div style="font-size:0.75rem; color:#9bb0cc;">${g.author ? `by ${escapeHtml(g.author)}` : ''}</div>
                        <button class="hero-btn" onclick="openGame(${g.id})">Play now →</button>
                    </div>
                </div>
            </div>
        `).join('');
        // reinit swiper after content update to avoid stuck
        if(state.heroSwiper) {
            state.heroSwiper.update();
            state.heroSwiper.autoplay.start();
        }
    }

    function toggleFavorite(id, starEl) {
        let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
        if(favs.includes(id)) favs = favs.filter(f => f !== id);
        else favs.push(id);
        localStorage.setItem('favorites', JSON.stringify(favs));
        if(starEl) starEl.classList.toggle('starred');
        renderAllGames(); renderFeatured(); renderTrending();
        if(!document.getElementById('modernView').classList.contains('hidden')) showAll();
    }

    let currentGameObject = null;

    async function openGame(id) {
        const game = state.games.find(g => g.id === id);
        if(!game) return;
        currentGameObject = game;
        document.getElementById('zoneName').innerText = game.name;
        document.getElementById('zoneAuthor').innerText = game.author ? `by ${game.author}` : '';
        const viewer = document.getElementById('zoneViewer');
        const frame = document.getElementById('zoneFrame');
        viewer.style.display = 'flex';
        document.querySelector('.chip-strip').style.display = 'none';
        document.querySelector('.search-wrap').style.display = 'none';
        document.querySelector('main').style.display = 'none';
        document.querySelector('footer').style.display = 'none';
        let url = resolveUrl(game.url);
        try {
            let resp = await fetch(url + "?t=" + Date.now());
            let html = await resp.text();
            if(html.includes("Couldn't find")) {
                const fallbackUrl = game.url.replace("{COVER_URL}", CONFIG.coversFallback).replace("{HTML_URL}", CONFIG.htmlFallback);
                resp = await fetch(fallbackUrl + "?t=" + Date.now());
                html = await resp.text();
            }
            frame.contentWindow.document.open();
            frame.contentWindow.document.write(html);
            frame.contentWindow.document.close();
        } catch(e) { alert("Failed to load game"); closeZone(); }
    }

    function closeZone() {
        document.getElementById('zoneViewer').style.display = 'none';
        document.getElementById('zoneFrame').src = 'about:blank';
        document.querySelector('.chip-strip').style.display = '';
        document.querySelector('.search-wrap').style.display = '';
        document.querySelector('main').style.display = '';
        document.querySelector('footer').style.display = '';
        currentGameObject = null;
    }

    function fullscreenFrame() { 
        const iframe = document.getElementById('zoneFrame');
        if(iframe.requestFullscreen) iframe.requestFullscreen();
    }

    async function openInAboutBlank() {
        if(!currentGameObject) {
            const name = document.getElementById('zoneName').innerText;
            const game = state.games.find(g => g.name === name);
            if(game) currentGameObject = game;
            else return;
        }
        const win = window.open('about:blank', '_blank');
        if(!win) { alert("Popup blocked. Allow popups for this site."); return; }
        const url = resolveUrl(currentGameObject.url);
        try {
            let resp = await fetch(url + "?t=" + Date.now());
            let html = await resp.text();
            if(html.includes("Couldn't find")) {
                const fallbackUrl = currentGameObject.url.replace("{COVER_URL}", CONFIG.coversFallback).replace("{HTML_URL}", CONFIG.htmlFallback);
                resp = await fetch(fallbackUrl + "?t=" + Date.now());
                html = await resp.text();
            }
            win.document.write(html);
            win.document.close();
        } catch(e) { alert("Failed to open in new tab"); }
    }

    async function downloadGame() {
        if(!currentGameObject) {
            const name = document.getElementById('zoneName').innerText;
            const game = state.games.find(g => g.name === name);
            if(game) currentGameObject = game;
            else return;
        }
        const url = resolveUrl(currentGameObject.url);
        try {
            let resp = await fetch(url + "?t=" + Date.now());
            let html = await resp.text();
            if(html.includes("Couldn't find")) {
                const fallbackUrl = currentGameObject.url.replace("{COVER_URL}", CONFIG.coversFallback).replace("{HTML_URL}", CONFIG.htmlFallback);
                resp = await fetch(fallbackUrl + "?t=" + Date.now());
                html = await resp.text();
            }
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${currentGameObject.name.replace(/[^a-z0-9]/gi, '_')}.html`;
            a.click();
            URL.revokeObjectURL(a.href);
        } catch(e) { alert("Download failed"); }
    }

    function openModal(title, content) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalContent').innerHTML = content; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; }
    function openSettings() { openModal("Preferences", `<button class="hero-btn" style="margin:0.5rem 0;" onclick="exportData()">Export save data</button><br><button class="hero-btn" onclick="document.getElementById('importFile').click()">Import save data</button><input type="file" id="importFile" style="display:none">`); }
    function exportData() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({favorites:localStorage.getItem('favorites')})],{type:'application/json'})); a.download='gnmath_save.json'; a.click(); }
    document.getElementById('importFile')?.addEventListener('change', e => { const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>{ try{ const data=JSON.parse(ev.target.result); if(data.favorites) localStorage.setItem('favorites',JSON.stringify(data.favorites)); location.reload(); }catch(e){ alert("Invalid file"); } }; reader.readAsText(file); });

    function initSwipers() {
        if(state.heroSwiper) state.heroSwiper.destroy();
        state.heroSwiper = new Swiper('.featured-slider', { 
            loop: true, 
            autoplay: { delay: 5000, disableOnInteraction: false }, 
            centeredSlides: true, 
            slidesPerView: 'auto', 
            navigation: { nextEl: '.featured-slider .swiper-button-next', prevEl: '.featured-slider .swiper-button-prev' }, 
            speed: 550,
            watchOverflow: true
        });
        if(state.trendingSwiper) state.trendingSwiper.destroy();
        state.trendingSwiper = new Swiper('#trendingSwiper', { slidesPerView: 'auto', spaceBetween: 14, navigation: { nextEl: '#trendingSwiper .swiper-button-next', prevEl: '#trendingSwiper .swiper-button-prev' } });
    }

    (async () => {
        try {
            state.games = await fetchGames();
            state.games.forEach(g => { if(!g.special) g.special = []; if(g.id===1 || g.id===42) g.featured = true; });
            buildCategories();
            renderHero();
            renderTrending();
            renderFeatured();
            renderAllGames();
            initSwipers();
            document.getElementById('sortSelect').addEventListener('change', () => renderAllGames());
            document.getElementById('searchBar').addEventListener('input', handleSearch);
        } catch(e) { document.getElementById('allGamesGrid').innerHTML = `<div style="text-align:center; padding:2rem;">⚠️ Failed to load games. Refresh.</div>`; }
    })();
</script>
</body>
</html>
