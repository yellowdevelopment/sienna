<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/tacostand/TemplateData/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/tacostand/TemplateData/style.css">
    <style>
      /* Force the game to fill the entire screen */
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #231f20;
      }
      #unity-container {
        width: 100% !important;
        height: 100% !important;
        position: absolute;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
      #unity-footer {
        display: none; 
      }

      /* CUSTOM LOADING SCREEN */
      #custom-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999;
        background: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .loading-logo {
        width: 120px; /* Adjust size here */
        height: auto;
        margin-bottom: 20px;
        animation: pulse 2s infinite ease-in-out;
      }

      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 0.9; }
      }

      .loading-title {
        color: white;
        font-size: 24px;
        font-weight: bold;
        letter-spacing: 2px;
        margin-bottom: 5px;
      }

      .loading-subtitle {
        color: #888;
        font-size: 14px;
        margin-bottom: 30px;
      }

      .progress-container {
        width: 300px;
      }

      .progress-bar-bg {
        background: #333;
        height: 8px;
        border-radius: 10px;
        overflow: hidden;
      }

      .progress-bar-fill {
        background: #00ffcc; /* Changed color to match a techy logo theme */
        width: 0%;
        height: 100%;
        transition: width 0.3s;
      }

      .progress-text {
        color: white;
        text-align: center;
        margin-top: 10px;
        font-size: 14px;
      }

      .merge-status {
        color: #555;
        font-size: 11px;
        text-align: center;
        margin-top: 5px;
      }

      .fun-message {
        color: #00ffcc;
        margin-top: 30px;
        font-size: 14px;
        height: 20px;
        transition: opacity 0.3s;
      }
      
      .fade-out {
        opacity: 0;
        transition: opacity 0.8s ease-out;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>

      <!-- CUSTOM LOADING SCREEN -->
      <div id="custom-loading">
        <img src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/g+/logo.png" class="loading-logo" alt="Game Logo">
        
        <div class="loading-title">TACO STAND</div>
        <div class="loading-subtitle">Preparing the tastiest tacos...</div>
        
        <div class="progress-container">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="merge-progress-bar"></div>
          </div>
          <div class="progress-text" id="merge-progress-text">0%</div>
          <div id="merge-status" class="merge-status">Initializing system...</div>
        </div>
        
        <div class="fun-message" id="fun-message"></div>
      </div>

      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>

    <script>
      // FUN LOADING MESSAGES
      const funMessages = [
        "Thanks for Using sienna.",
        "Seasoning the meat just right... 🌶️",
        "Warming up the tortillas... 🫓",
        "Adding extra guacamole... 🥑",
        "Squeezing fresh limes... 🍋",
        "Taste-testing the salsa... 💃",
        "Grilling to perfection... 🔥",
        "Folding tacos with love... ❤️",
        "Sprinkling cilantro on top... 🌿",
        "Almost ready to serve! 🎉"
      ];

      let funMsgIndex = 0;
      const funMsgEl = document.getElementById('fun-message');

      function rotateFunMessage() {
        funMsgEl.style.opacity = '0';
        setTimeout(() => {
          funMsgEl.textContent = funMessages[funMsgIndex % funMessages.length];
          funMsgEl.style.opacity = '0.8';
          funMsgIndex++;
        }, 300);
      }

      rotateFunMessage();
      const funMsgInterval = setInterval(rotateFunMessage, 3000);

      // FILE MERGE SYSTEM
      const mergeConfig = {
        files: [
          { name: 'web.data.gz', parts: 4 },
          { name: 'web.wasm.gz', parts: 3 }
        ],
        basePath: 'https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/tacostand/Build/'
      };

      const mergedFiles = {};
      const progressBar = document.getElementById('merge-progress-bar');
      const progressText = document.getElementById('merge-progress-text');
      const statusEl = document.getElementById('merge-status');

      async function mergeFileParts(baseName, partCount, progressCallback) {
        const chunks = [];
        for (let i = 0; i < partCount; i++) {
          const partUrl = mergeConfig.basePath + baseName + '.part' + i;
          const response = await fetch(partUrl);
          if (!response.ok) throw new Error(`Failed to load ${partUrl}`);
          const reader = response.body.getReader();
          let received = 0;
          const partChunks = [];
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            partChunks.push(value);
            received += value.length;
          }
          const partData = new Uint8Array(received);
          let offset = 0;
          for (const chunk of partChunks) {
            partData.set(chunk, offset);
            offset += chunk.length;
          }
          chunks.push(partData);
          progressCallback(i + 1, partCount);
        }
        const totalSize = chunks.reduce((acc, c) => acc + c.length, 0);
        const merged = new Uint8Array(totalSize);
        let off = 0;
        for (const chunk of chunks) {
          merged.set(chunk, off);
          off += chunk.length;
        }
        return merged.buffer;
      }

      async function mergeAllFiles() {
        const totalParts = mergeConfig.files.reduce((a, f) => a + f.parts, 0);
        let completedParts = 0;
        for (const file of mergeConfig.files) {
          const buffer = await mergeFileParts(file.name, file.parts, (current, total) => {
            completedParts++;
            const pct = Math.round((completedParts / totalParts) * 100);
            progressBar.style.width = pct + '%';
            progressText.textContent = pct + '%';
            statusEl.textContent = `Downloading ${file.name}...`;
          });
          mergedFiles[file.name] = buffer;
        }
      }

      // FETCH INTERCEPTOR
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (typeof url === 'string') {
          for (const file of mergeConfig.files) {
            if (url.endsWith(file.name) || url.includes('/' + file.name)) {
              if (mergedFiles[file.name]) {
                return Promise.resolve(new Response(mergedFiles[file.name], {
                  status: 200,
                  headers: { 'Content-Type': 'application/octet-stream' }
                }));
              }
            }
          }
        }
        return originalFetch.apply(this, arguments);
      };

      // UNITY INIT
      var canvas = document.querySelector("#unity-canvas");
      var buildUrl = "https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/tacostand/Build";
      var loaderUrl = buildUrl + "/web.loader.js";
      var config = {
        dataUrl: buildUrl + "/web.data.gz",
        frameworkUrl: buildUrl + "/web.framework.js",
        codeUrl: buildUrl + "/web.wasm.gz",
        streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/tacostand/StreamingAssets",
        companyName: "Wave Infinite",
        productName: "Taco Stand",
        productVersion: "0.1",
      };

      mergeAllFiles().then(() => {
        clearInterval(funMsgInterval);
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            const pct = Math.round(progress * 100);
            progressBar.style.width = pct + '%';
            progressText.textContent = pct + '%';
            statusEl.textContent = 'Launching Game...';
          }).then((unityInstance) => {
            document.getElementById('custom-loading').classList.add('fade-out');
            setTimeout(() => {
              document.getElementById('custom-loading').style.display = 'none';
            }, 800);
          });
        };
        document.body.appendChild(script);
      });
    </script>
  </body>
</html>
