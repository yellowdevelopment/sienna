<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/killtheiceagebabyadventurethegame/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Ice Age Baby Adventure</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'Kill the Ice Age Baby Adventure The Game.data.unityweb', parts: 3 },
        ],
        basePath: 'Build/',
        debug: true
      };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js"></script>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/Kill the Ice Age Baby Adventure The Game.json", {onProgress: UnityProgress});
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      .webgl-content {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
      }

      #unityContainer {
        flex: 1;
        width: 100% !important;
        height: 100% !important;
      }

      #unityContainer canvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* Keep the original footer but pin it to the bottom */
      .footer {
        display: flex;
        align-items: center;
        padding: 4px 10px;
        background: #000;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="webgl-content">
      <div id="unityContainer"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="unityInstance.SetFullscreen(1)"></div>
        <div class="title">Ice Age Baby Adventure</div>
      </div>
    </div>
  </body>
</html>
