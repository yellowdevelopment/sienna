<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Unity WebGL Player | boil Noodles at Night</title>

  <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/boilnoodlesatnight/"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #unity-container {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    #unity-loading-bar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #unity-footer {
      display: none; /* removes fullscreen button + footer */
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      var div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/WebGLBuild.loader.js";

    var config = {
      frameworkUrl: buildUrl + "/WebGLBuild.framework.js",
      dataUrl: buildUrl + "/WebGLBuild.data",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "arydk",
      productName: "boil Noodles at Night",
      productVersion: "0.1",
      showBanner: unityShowBanner,
    };

    // FORCE FULLSCREEN SIZE (important)
    canvas.style.width = "100%";
    canvas.style.height = "100%";

    loadingBar.style.display = "block";

    function fetchAndMergeWasm() {
      return Promise.all([
        fetch(buildUrl + "/WebGLBuild.wasm.part001").then(r => r.arrayBuffer()),
        fetch(buildUrl + "/WebGLBuild.wasm.part002").then(r => r.arrayBuffer())
      ]).then(buffers => {
        var total = buffers.reduce((s, b) => s + b.byteLength, 0);
        var merged = new Uint8Array(total);
        var offset = 0;

        buffers.forEach(b => {
          merged.set(new Uint8Array(b), offset);
          offset += b.byteLength;
        });

        return new Blob([merged], { type: "application/wasm" });
      });
    }

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = function () {
      fetchAndMergeWasm().then(wasmBlob => {
        config.codeUrl = URL.createObjectURL(wasmBlob);

        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then(function () {
          loadingBar.style.display = "none";
        }).catch(alert);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
