	<script>
		var cancelKeypress = false;
		
		document.onkeydown = function(evt) {
			evt = evt || window.event;
			cancelKeypress = /^(37|38|39|40)$/.test("" + evt.keyCode);
			if (cancelKeypress) {
				return false;
			}
		};
		
		/* For Opera */
		document.onkeypress = function(evt) {
			if (cancelKeypress) {
				return false;
			}
		};
	</script>
