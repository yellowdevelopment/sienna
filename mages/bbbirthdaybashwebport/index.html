<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/bbbirthdaybashwebport/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Baldi's Basics 1 Year Birthday Bash</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'bbbirthdaybashwebport.data.unityweb', parts: 2 },
        ],
        basePath: 'Build/',
        debug: true
      };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js"></script>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
      }
      .webgl-content {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #gameContainer {
        width: 100% !important;
        height: 100% !important;
        flex: 1;
      }
      #gameContainer canvas {
        width: 100% !important;
        height: 100% !important;
      }
      .footer {
        display: none;
      }
      #fullscreen-btn {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 9999;
        background: rgba(0,0,0,0.6);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.3);
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-family: sans-serif;
      }
      #fullscreen-btn:hover { background: rgba(0,0,0,0.85); }
    </style>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/bbbirthdaybashwebport.json", {onProgress: UnityProgress});

      function goFullscreen() {
        var el = document.getElementById("gameContainer");
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        else if (gameInstance && gameInstance.SetFullscreen) gameInstance.SetFullscreen(1);
      }

      window.addEventListener("load", function() {
        setTimeout(goFullscreen, 1500);
      });
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
        <div class="title">Baldi's Basics 1 Year Birthday Bash</div>
      </div>
    </div>
  </body>
</html>
