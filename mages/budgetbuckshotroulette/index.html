var splitFiles = { "6.wasm.br": 3 };
var mergedFileCache = {};

async function downloadAndMergeParts(fileName, partCount) {
    var parts = [], totalLoaded = 0;
    for (var i = 0; i < partCount; i++) {
        var resp = await fetch("Build/parts/" + fileName + ".part" + i);
        if (!resp.ok) throw new Error("Part hata: " + fileName + ".part" + i + " (" + resp.status + ")");
        var ab = await resp.arrayBuffer();
        parts.push(new Uint8Array(ab));
        totalLoaded += ab.byteLength;
        console.log("  [" + fileName + "] Part " + (i+1) + "/" + partCount + " (" + (totalLoaded/1048576).toFixed(1) + " MB)");
    }
    var totalSize = parts.reduce(function(s,p){ return s+p.length; }, 0);
    var merged = new Uint8Array(totalSize);
    var offset = 0;
    for (var j = 0; j < parts.length; j++) { merged.set(parts[j], offset); offset += parts[j].length; }
    console.log("%c[Merger] " + fileName + ": " + (totalSize/1048576).toFixed(1) + " MB OK", "color:#73FF73;background:#454545");
    return merged.buffer;
}

async function mergeAllSplitFiles() {
    var fns = Object.keys(splitFiles);
    for (var i = 0; i < fns.length; i++) {
        console.log("%c[Merger] " + fns[i] + " (" + splitFiles[fns[i]] + " part)...", "color:#73DFFF;background:#454545");
        mergedFileCache[fns[i]] = await downloadAndMergeParts(fns[i], splitFiles[fns[i]]);
    }
    console.log("%c[Merger] Tamamlandi!", "color:#73FF73;background:#454545");
}

// FETCH OVERRIDE
var originalFetch = window.fetch.bind(window);
window.fetch = function(input, init) {
    var url = (typeof input === "string") ? input : (input && input.url ? input.url : "");
    var keys = Object.keys(mergedFileCache);
    for (var i = 0; i < keys.length; i++) {
        if (url.indexOf(keys[i]) !== -1 && mergedFileCache[keys[i]]) {
            console.log("%c[FetchOverride] " + keys[i], "color:#FFDF73;background:#454545");
            var buf = mergedFileCache[keys[i]];
            return Promise.resolve(new Response(buf, {
                status: 200, statusText: "OK",
                headers: { "Content-Type": "application/octet-stream", "Content-Length": buf.byteLength.toString() }
            }));
        }
    }
    return originalFetch(input, init);
};

// XHR OVERRIDE
var OrigXHR = window.XMLHttpRequest;
window.XMLHttpRequest = function PatchedXHR() {
    var xhr = new OrigXHR();
    var origOpen = xhr.open.bind(xhr), origSend = xhr.send.bind(xhr), intercepted = null;
    xhr.open = function(method, url) {
        intercepted = null;
        if (typeof url === "string") {
            var keys = Object.keys(mergedFileCache);
            for (var i = 0; i < keys.length; i++) {
                if (url.indexOf(keys[i]) !== -1 && mergedFileCache[keys[i]]) { intercepted = keys[i]; break; }
            }
        }
        return origOpen.apply(xhr, arguments);
    };
    xhr.send = function(body) {
        if (intercepted) {
            var buf = mergedFileCache[intercepted];
            Object.defineProperty(xhr, "status", { get: function(){ return 200; } });
            Object.defineProperty(xhr, "statusText", { get: function(){ return "OK"; } });
            Object.defineProperty(xhr, "readyState", { get: function(){ return 4; } });
            Object.defineProperty(xhr, "response", { get: function(){ return buf; } });
            setTimeout(function() {
                if (xhr.onreadystatechange) xhr.onreadystatechange();
                if (xhr.onload) xhr.onload();
                try { xhr.dispatchEvent(new Event("load")); } catch(e) {}
                try { xhr.dispatchEvent(new Event("loadend")); } catch(e) {}
            }, 0);
            return;
        }
        return origSend.apply(xhr, arguments);
    };
    return xhr;
};

}

async function GetLeaderboardScores(nameLB, maxPlayers, quantityTop, quantityAround, photoSize, auth) {

            .then(lb => lb.getLeaderboardDescription(nameLB))

                jsonEntries.isInvertSortOrder = res.description.invert_sort_order;
                jsonEntries.decimalOffset = res.description.score_format.options.decimal_offset;
                jsonEntries.type = res.description.type;
                return leaderboard.getLeaderboardEntries(nameLB, { quantityTop:quantityTop, includeUser:auth, quantityAround:quantityAround });
            })
            .then(res => {
                let combinedJson = { ...jsonEntries, ...EntriesLB(res, maxPlayers, photoSize) };
                myGameInstance.SendMessage('YandexGame', 'LeaderboardEntries', JSON.stringify(combinedJson));
            })
            .catch(error => { console.error(error); });
    } catch (e) { console.error('CRASH Get Leaderboard: ', e.message); }
}

function EntriesLB(res, maxPlayers, photoSize) {
    let text = '', count = Math.min(res.entries.length, maxPlayers);
    let ranks=new Array(count), photos=new Array(count), names=new Array(count), scores=new Array(count), uids=new Array(count);
    for (var i=0; i<count; i++) {
        ranks[i]=res.entries[i].rank; scores[i]=res.entries[i].score;
        uids[i]=res.entries[i].player.uniqueID; photos[i]=res.entries[i].player.getAvatarSrc(photoSize);
        names[i]=res.entries[i].player.scopePermissions.public_name!=="allow"?"anonymous":res.entries[i].player.publicName;
        text+=ranks[i]+'. '+names[i]+": "+scores[i]+'\n';
    }
    if(count===0) text='no data';
    return {"entries":text,"ranks":ranks,"photos":photos,"names":names,"scores":scores,"uniqueIDs":uids};
}

            } else {
                let _scopes = false;
                ysdk.getPlayer({ scopes: _scopes }).then(_player => {
                    player = _player;
                    let playerName = _scopes ? player.getName() : "anonymous";
                    let playerPhoto = _scopes ? player.getPhoto('small') : "null";

                    if (player.getMode() === 'lite') {
                        var na = NotAuthorized();
                        if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', na);
                        resolve(na);
                    } else {
                        let authJson = {
                            "playerAuth":"resolved","playerName":playerName,
                            "playerId":player.getUniqueID(),"playerPhoto":playerPhoto,
                            "payingStatus":player.getPayingStatus()
                        };
                        if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', JSON.stringify(authJson));
                        resolve(JSON.stringify(authJson));
                    }
                }).catch(e => {
                    var na = NotAuthorized();
                    if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', na);
                    resolve(na);
                });
            }
        } catch (e) {
            var na = NotAuthorized();
            if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', na);
            resolve(na);
        }
    });
}

function NotAuthorized() {
    return JSON.stringify({
        "playerAuth":"rejected","playerName":"unauthorized",
        "playerId":"unauthorized","playerPhoto":"unknown",
        "payingStatus": (player && player.getPayingStatus) ? player.getPayingStatus() : "unknown"
    });
}

function OpenAuthDialog() {
    if (ysdk !== null) {
        try {
            ysdk.auth.openAuthDialog().then(() => {
                InitPlayer(true).then(() => {
                    myGameInstance.SendMessage('YandexGame', 'GetDataInvoke');
                });
            });
        } catch (e) { console.log('CRASH Open Auth Dialog: ', e.message); }
    }
}

document.body.appendChild(script);
</script>
