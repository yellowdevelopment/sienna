<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/irori/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | irori</title>
        <script>
    window.fileMergerConfig = {
      files: [
        { name: 'Web_v0.32.data.unityweb', parts: 2 },
      ],
      basePath: 'Build/',
      debug: true
    };
  </script>
  <script src="https://cdn.jsdelivr.net/gh/skibbsz/jsdelivr-cdns@main/merge.js" ></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      UnityLoader.instantiate("unityContainer", "Build/Web_v0.32.json");
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #unityContainer {
        width: 100vw;
        height: 100vh;
      }

      /* Unity injects a canvas — make sure it fills the container */
      #unityContainer canvas {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>

    <div id="unityContainer"></div>
  </body>
